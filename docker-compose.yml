services:
  backend:
    image: ghcr.io/rfalias/unchef/backend:latest
    volumes:
      - db_data:/data
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/food_app.db
      JWT_SECRET: changeme
      JWT_LIFETIME_SECONDS: 2592000
      CORS_ORIGINS: http://localhost,http://192.168.1.100,https://chef.example.com
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: ghcr.io/rfalias/unchef/frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
